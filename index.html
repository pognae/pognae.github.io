<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Calc365는 퍼센트, 할인, D-day, BMI, 대출 등 30종 생활 계산기와 변환기를 한곳에 모은 무료 웹 도구입니다.">
    <meta name="keywords" content="계산365, Calc365, 퍼센트 계산기, BMI, D-day, 대출 계산기, 실수령액">
    <meta name="author" content="Calc365">
    <meta name="theme-color" content="#0f766e">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Calc365 | 계산365">
    <meta property="og:description" content="생활에 필요한 30종 계산기를 한곳에서 무료로 사용하세요.">
    <meta property="og:url" content="https://pognae.github.io/calc365/">
    <meta property="og:locale" content="ko_KR">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Calc365 | 계산365">
    <meta name="twitter:description" content="생활에 필요한 30종 계산기를 한곳에서 무료로 사용하세요.">
    <title>Calc365 | 계산365</title>
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icons/icon.svg">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="canonical" href="https://pognae.github.io/calc365/">
    <link rel="stylesheet" href="styles.css">
    <script>
      try {
        var t = JSON.parse(localStorage.getItem("calc365:theme"));
        if (t === "dark") document.documentElement.dataset.theme = "dark";
      } catch (e) {}
    </script>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="계산기 탐색">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">365</div>
          <div>
            <h1>Calc365</h1>
            <p>계산365</p>
          </div>
        </div>

        <label class="search">
          <span>검색</span>
          <input id="toolSearch" type="search" placeholder="D-day, BMI, 대출..." autocomplete="off">
        </label>

        <nav class="category-tabs" aria-label="카테고리">
          <button class="active" type="button" data-category="all">전체</button>
          <button type="button" data-category="money">금융</button>
          <button type="button" data-category="date">날짜</button>
          <button type="button" data-category="health">건강</button>
          <button type="button" data-category="life">생활</button>
          <button type="button" data-category="convert">변환</button>
          <button type="button" data-category="etc">기타</button>
        </nav>

        <section class="side-section">
          <h2>즐겨찾기</h2>
          <div id="favoriteList" class="mini-list empty">아직 없음</div>
        </section>

        <section class="side-section">
          <h2>최근 사용</h2>
          <div id="recentList" class="mini-list empty">아직 없음</div>
        </section>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">Daily calculators</p>
            <h2 id="toolTitle">기본 계산기</h2>
          </div>
          <div class="topbar-actions">
            <button id="themeToggle" class="icon-button" type="button" aria-label="다크 모드" title="테마 전환">
              <span aria-hidden="true">🌙</span>
            </button>
            <button id="favoriteToggle" class="icon-button" type="button" aria-label="즐겨찾기 추가" title="즐겨찾기">
              <span aria-hidden="true">☆</span>
            </button>
          </div>
        </header>

        <section class="tool-strip" id="toolStrip" aria-label="계산기 목록"></section>

        <section class="calculator-layout">
          <article class="tool-panel">
            <div id="toolBody"></div>
          </article>

          <aside class="result-panel" aria-live="polite">
            <p class="result-label">결과</p>
            <div id="resultValue" class="result-value">0</div>
            <p id="resultDetail" class="result-detail">계산할 값을 입력하세요.</p>
          </aside>
        </section>

        <div class="ad-slot" id="adBottom" aria-hidden="true" data-ads-slot="bottom"></div>

        <footer class="site-footer">
          <nav aria-label="사이트 정보">
            <a href="index.html" aria-current="page">홈</a>
            <a href="about.html">소개</a>
            <a href="privacy.html">개인정보처리방침</a>
            <a href="contact.html">문의</a>
          </nav>
          <p>© Calc365 · 계산365</p>
        </footer>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
