---
layout: default
---
<article class="blog-post">
  {% if page.preview %}
  <p class="preview-banner" role="status">미리보기 — {{ page.date | date: "%Y.%m.%d" }} 09:00(KST)에 공개됩니다. 블로그 목록·검색에는 노출되지 않습니다.</p>
  {% endif %}
  <header class="blog-post-header">
    <h1>{{ page.title }}</h1>
    <p class="page-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y년 %m월 %d일" }}</time>
      {% if page.category %} · {{ page.category }}{% endif %}
    </p>
  </header>
  <div class="blog-body">
    {{ content }}
  </div>
  <p class="blog-back"><a href="{{ '/blog/' | relative_url }}">← 블로그 목록</a></p>
</article>
