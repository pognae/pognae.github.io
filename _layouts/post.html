---
layout: default
---
<article class="blog-post">
  {% if page.preview %}
  <p class="preview-banner" role="status">미리보기 — {{ page.date | date: "%Y.%m.%d" }} 09:00(KST)에 공개됩니다. 목록·검색에는 노출되지
    않습니다.</p>
  {% endif %}
  <header class="blog-post-header">
    <h1>{{ page.title }}</h1>
    <p class="page-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y년 %m월 %d일" }}</time>
      {% if page.category %} · {{ page.category }}{% endif %}
    </p>
  </header>
  <div class="blog-body">
    {{ content }}
  </div>
  <aside class="ad-slot ad-slot-post" aria-label="광고">
    <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-5461344534519122" data-ad-slot=""
      data-ad-format="auto" data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
  </aside>
  <p class="blog-back"><a href="{{ '/' | relative_url }}">← 글 목록</a></p>

  <!-- Cusdis 댓글 시스템 (완전 무료, 익명 지원, 광고 없음) -->
  <div style="margin-top: 40px; padding-top: 30px; padding-bottom: 50px; border-top: 1px solid #eee; min-height: 300px;">
    <div id="cusdis_thread" data-host="https://cusdis.com" data-app-id="db02f8b9-8563-4eda-9b25-892c45f40249"
      data-page-id="{{ page.id }}" data-page-url="{{ page.url | absolute_url }}" data-page-title="{{ page.title }}">
    </div>
    <script async defer src="https://cusdis.com/js/cusdis.es.js"></script>
  </div>
</article>
