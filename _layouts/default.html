<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ page.description | default: site.description | escape }}">
    {% if page.keywords %}<meta name="keywords" content="{{ page.keywords | escape }}">{% endif %}
    <link rel="canonical" href="{{ page.url | replace:'index.html','' | absolute_url }}">
    <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
    <meta property="og:title" content="{{ page.title | default: site.title | escape }}">
    <meta property="og:description" content="{{ page.description | default: site.description | escape }}">
    <meta property="og:url" content="{{ page.url | replace:'index.html','' | absolute_url }}">
    <meta property="og:site_name" content="Calc365">
    <meta property="og:locale" content="ko_KR">
    {% if page.date %}<meta property="article:published_time" content="{{ page.date | date_to_xmlschema }}">{% endif %}
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="{{ page.title | default: site.title | escape }}">
    <meta name="twitter:description" content="{{ page.description | default: site.description | escape }}">
    {% if page.preview %}<meta name="robots" content="noindex, nofollow">{% endif %}
    <title>{{ page.title | escape }} | Calc365</title>
    <link rel="stylesheet" href="{{ '/styles.css' | relative_url }}">
    <link rel="icon" href="{{ '/icons/icon.svg' | relative_url }}" type="image/svg+xml">
    <link rel="manifest" href="{{ '/manifest.webmanifest' | relative_url }}">
    <meta name="theme-color" content="#0f766e">
    <script>
      try {
        var t = JSON.parse(localStorage.getItem("calc365:theme"));
        if (t === "dark") document.documentElement.dataset.theme = "dark";
      } catch (e) {}
    </script>
    {% if page.layout == 'post' and page.preview != true %}
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BlogPosting",
      "headline": {{ page.title | jsonify }},
      "description": {{ page.description | jsonify }},
      "datePublished": "{{ page.date | date_to_xmlschema }}",
      "author": { "@type": "Organization", "name": "Calc365" },
      "publisher": {
        "@type": "Organization",
        "name": "Calc365",
        "logo": { "@type": "ImageObject", "url": "{{ '/icons/icon.svg' | absolute_url }}" }
      },
      "mainEntityOfPage": { "@type": "WebPage", "@id": "{{ page.url | replace:'index.html','' | absolute_url }}" }
    }
    </script>
    {% endif %}
  </head>
  <body>
    <div class="page-shell">
      <header class="page-header">
        <a class="page-brand" href="{{ '/' | relative_url }}">
          <span class="brand-mark" aria-hidden="true">365</span>
          <span>Calc365</span>
        </a>
        <button id="themeToggle" class="icon-button" type="button" aria-label="다크 모드" title="테마 전환">
          <span aria-hidden="true">🌙</span>
        </button>
      </header>

      <main class="page-content">
        {{ content }}
      </main>

      <footer class="site-footer">
        <nav aria-label="사이트 정보">
          <a href="{{ '/' | relative_url }}">홈</a>
          <a href="{{ '/about.html' | relative_url }}">소개</a>
          <a href="{{ '/blog/' | relative_url }}"{% if page.url contains '/blog/' %} aria-current="page"{% endif %}>블로그</a>
          <a href="{{ '/privacy.html' | relative_url }}">개인정보처리방침</a>
          <a href="{{ '/contact.html' | relative_url }}">문의</a>
        </nav>
        <p>© Calc365 · 계산365</p>
      </footer>
    </div>
    <script src="{{ '/page.js' | relative_url }}"></script>
  </body>
</html>
