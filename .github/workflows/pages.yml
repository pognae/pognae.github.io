name: Build and deploy site

on:
  push:
    branches: [main]
  schedule:
    # 매일 09:00 KST (UTC 00:00)
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish due posts (KST filename date)
        run: node scripts/publish-due-posts.mjs

      - name: Sync preview collection
        run: node scripts/sync-preview.mjs

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Build with Jekyll
        run: bundle exec jekyll build --trace

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Commit published posts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _posts/ _posts-pending/
          if git diff --staged --quiet; then
            echo "No post files to commit."
          else
            git commit -m "chore: auto-publish scheduled blog posts [skip ci]"
            git push
          fi
