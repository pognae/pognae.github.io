name: Build and deploy site

on:
  push:
    branches: [main]
  schedule:
    # 매일 09:00 KST (UTC 00:00) — 1차
    - cron: "0 0 * * *"
    # 매일 15:00 KST (UTC 06:00) — 2차 백업 (GitHub cron 지연·누락 대비)
    - cron: "0 6 * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [publish-blog]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Publish due posts (KST filename date)
        run: node scripts/publish-due-posts.mjs

      - name: Verify auto-publish pipeline
        run: node scripts/verify-auto-publish.mjs

      - name: Sync preview collection
        run: node scripts/sync-preview.mjs

      - name: Generate sitemap
        run: node scripts/generate-sitemap.mjs

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          cache-version: 1

      - name: Build with Jekyll
        env:
          JEKYLL_ENV: production
        run: bundle exec jekyll build --trace


      - name: Verify build output
        run: |
          test -f _site/index.html
          test -f _site/blog/index.html
          test -f _site/sitemap.xml
          echo "Build OK — $(find _site -type f | wc -l) files"
          echo "Blog posts in site: $(find _site/blog -name 'index.html' 2>/dev/null | wc -l)"

      - name: Commit published posts
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _posts/ _posts-pending/ sitemap.xml
          if git diff --staged --quiet; then
            echo "No files to commit."
          else
            git commit -m "chore: auto-publish scheduled blog posts and update sitemap [skip ci]"
            git push
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
