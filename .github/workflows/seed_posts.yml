name: Seed Factual Soccer Posts

on:
  workflow_dispatch: # 수동 실행 트리거

jobs:
  seed-posts:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm install
        
      - name: Run Seeding Script
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: |
          node scripts/seed_soccer_posts.js
          node scripts/generate-sitemap.mjs
        
      - name: Commit and push seeded posts
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add _posts/ sitemap.xml
          git commit -m "chore: seed 20 high-quality factual soccer posts" || echo "No changes to commit"
          git push
