title: MonoPoint
name: MonoPoint
description: K리그, 해외축구, 경기 분석 및 축구 관련 최신 소식과 핵심 정보를 전달하는 전문 축구 블로그
logo: /icons/icon.svg
lang: ko-KR
timezone: Asia/Seoul
future: true
url: "https://monopoint.app"
baseurl: ""
permalink: /blog/:year/:month/:day/:slug/

theme: minimal-mistakes-jekyll
minimal_mistakes_skin: "air" # 깔끔하고 가독성 좋은 'air' 스킨 적용

author:
  name   : "MonoPoint"
  avatar : "/icons/icon.svg"
  bio    : "K리그, 해외축구 경기 분석, 관전 포인트 및 주요 축구 소식을 명확하고 깊이 있게 전달합니다."
  links:
    - label: "Home"
      icon: "fas fa-fw fa-home"
      url: "https://monopoint.app"

footer:
  links:
    - label: "소개"
      url: "/about.html"
    - label: "개인정보처리방침"
      url: "/privacy.html"
    - label: "이용약관"
      url: "/terms.html"
    - label: "문의"
      url: "/contact.html"

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-include-cache

paginate: 10
paginate_path: "/page:num/"

markdown: kramdown
kramdown:
  input: GFM

collections:
  preview:
    output: true
    permalink: /preview/:year/:month/:day/:slug/

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .gitignore
  - .cursor
  - .agents
  - AGENTS.md
  - MEMORY.md
  - _posts-pending
  - _posts-pending-archive
  - _posts-archive
  - _preview
  - scripts
  - node_modules
  - vendor
  - vendor/bundle
  - .bundle

defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: false
      comments: true
      share: true
      related: true

comments:
  provider: "cusdis"
  cusdis:
    app_id: "db02f8b9-8563-4eda-9b25-892c45f40249"

