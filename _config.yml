title: MonPoint
description: 생활·금융·건강 실용 정보 블로그 — 몬포인트
lang: ko-KR
timezone: Asia/Seoul
url: "https://monpoint.app"
baseurl: ""
permalink: /blog/:year/:month/:day/:slug/

markdown: kramdown
kramdown:
  input: GFM

collections:
  preview:
    output: true
    permalink: /preview/:year/:month/:day/:slug/

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .gitignore
  - .cursor
  - .agents
  - AGENTS.md
  - MEMORY.md
  - _posts-pending
  - _preview
  - scripts
  - node_modules
  - vendor
  - vendor/bundle
  - .bundle
