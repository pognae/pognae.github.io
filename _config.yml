title: MonoPoint
name: MonoPoint
description: AI 최신 기술과 트렌드를 비전공자도 알기 쉽게 설명해드리는 전문 블로그
logo: /icons/icon.svg
lang: ko-KR
timezone: Asia/Seoul
future: true
url: "https://monopoint.app"
baseurl: ""
permalink: /blog/:year/:month/:day/:slug/

theme: minimal-mistakes-jekyll
minimal_mistakes_skin: "air" # 깔끔하고 가독성 좋은 'air' 스킨 적용

author:
  name   : "MonoPoint"
  avatar : "/icons/icon.svg"
  bio    : "AI 기술, 활용법, 최신 동향을 비전공자도 쉽게 이해할 수 있도록 전달합니다."
  links:
    - label: "Home"
      icon: "fas fa-fw fa-home"
      url: "https://monopoint.app"

footer:
  links:
    - label: "소개"
      url: "/about.html"
    - label: "개인정보처리방침"
      url: "/privacy.html"
    - label: "문의"
      url: "/contact.html"

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-include-cache

paginate: 10
paginate_path: "/page:num/"

markdown: kramdown
kramdown:
  input: GFM

collections:
  preview:
    output: true
    permalink: /preview/:year/:month/:day/:slug/

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .gitignore
  - .cursor
  - .agents
  - AGENTS.md
  - MEMORY.md
  - _posts-pending
  - _preview
  - scripts
  - node_modules
  - vendor
  - vendor/bundle
  - .bundle

defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: false
      comments: true
      share: true
      related: true

comments:
  provider: "cusdis"
  cusdis:
    app_id: "db02f8b9-8563-4eda-9b25-892c45f40249"

