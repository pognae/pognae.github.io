title: MonoPoint
name: MonoPoint
description: 생활·금융·건강 실용 정보 블로그 — 모노포인트
logo: /icons/icon.svg
lang: ko-KR
timezone: Asia/Seoul
future: true
url: "https://monopoint.app"
baseurl: ""
permalink: /blog/:year/:month/:day/:slug/

theme: minimal-mistakes-jekyll
minimal_mistakes_skin: "air" # 깔끔하고 가독성 좋은 'air' 스킨 적용

author:
  name   : "MonoPoint"
  avatar : "/icons/icon.svg"
  bio    : "검색량 높은 생활·금융·건강 주제를 쉽게 정리한 수익형 정보 블로그입니다."
  links:
    - label: "Home"
      icon: "fas fa-fw fa-home"
      url: "https://monopoint.app"

footer:
  links:
    - label: "소개"
      url: "/about.html"
    - label: "개인정보처리방침"
      url: "/privacy.html"
    - label: "문의"
      url: "/contact.html"

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-include-cache

paginate: 10
paginate_path: "/page:num/"

markdown: kramdown
kramdown:
  input: GFM

collections:
  preview:
    output: true
    permalink: /preview/:year/:month/:day/:slug/

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .gitignore
  - .cursor
  - .agents
  - AGENTS.md
  - MEMORY.md
  - _posts-pending
  - _preview
  - scripts
  - node_modules
  - vendor
  - vendor/bundle
  - .bundle
