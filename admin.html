layout: null
sitemap: false
robots: noindex, nofollow
---
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MonoPoint 관리자 대시보드 — 포스트 수정·삭제</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary-color: #2563eb;
      --bg-color: #f8fafc;
      --card-bg: #ffffff;
      --text-color: #1e293b;
      --border-color: #e2e8f0;
    }
    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      padding-bottom: 3rem;
    }
    .auth-container {
      max-width: 420px;
      margin: 80px auto;
      padding: 2.5rem;
      background: var(--card-bg);
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      border: 1px solid var(--border-color);
    }
    .admin-header {
      background: #ffffff;
      border-bottom: 1px solid var(--border-color);
      padding: 1rem 2rem;
      margin-bottom: 2rem;
    }
    .post-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1rem;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .post-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(0,0,0,0.04);
    }
    .post-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #0f172a;
      margin-bottom: 0.5rem;
    }
    .post-meta {
      font-size: 0.85rem;
      color: #64748b;
    }
    .badge-date {
      background-color: #e2e8f0;
      color: #334155;
    }
    .editor-textarea {
      font-family: monospace;
      font-size: 0.9rem;
      min-height: 400px;
    }
  </style>
</head>
<body>

  <!-- 1. 인증 화면 (보안 패스워드 & GitHub Token 저장) -->
  <div id="authSection" class="auth-container">
    <div class="text-center mb-4">
      <i class="fa-solid fa-user-shield text-primary fs-1 mb-2"></i>
      <h3 class="fw-bold">MonoPoint 관리자</h3>
      <p class="text-muted small">포스트 관리 권한 인증이 필요합니다.</p>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">GitHub Personal Access Token (PAT)</label>
      <input type="password" id="ghToken" class="form-control" placeholder="ghp_xxxxxxxxxxxx">
      <div class="form-text">GitHub 저장소 권한이 있는 Token을 입력하면 브라우저에서 직접 포스트 수정/삭제가 가능합니다.</div>
    </div>
    <button onclick="authenticate()" class="btn btn-primary w-100 fw-semibold py-2">
      <i class="fa-solid fa-lock-open me-2"></i>대시보드 접속
    </button>
  </div>

  <!-- 2. 관리자 메인 대시보드 화면 -->
  <div id="mainSection" class="d-none">
    <header class="admin-header d-flex justify-content-between align-items-center">
      <div class="d-flex align-items-center gap-3">
        <h4 class="mb-0 fw-bold"><i class="fa-solid fa-blog text-primary me-2"></i>MonoPoint 글 관리</h4>
        <span id="postCountBadge" class="badge bg-primary rounded-pill">0개 글</span>
      </div>
      <div>
        <button onclick="fetchPosts()" class="btn btn-outline-secondary btn-sm me-2"><i class="fa-solid fa-rotate me-1"></i>새로고침</button>
        <button onclick="logout()" class="btn btn-outline-danger btn-sm"><i class="fa-solid fa-right-from-bracket me-1"></i>로그아웃</button>
      </div>
    </header>

    <div class="container">
      <!-- 검색 & 필터 Bar -->
      <div class="row mb-4">
        <div class="col-md-8">
          <div class="input-group">
            <span class="input-group-text bg-white border-end-0"><i class="fa-solid fa-magnifying-glass text-muted"></i></span>
            <input type="text" id="searchInput" oninput="filterPosts()" class="form-control border-start-0" placeholder="포스트 제목 또는 파일명 검색...">
          </div>
        </div>
        <div class="col-md-4 text-end">
          <small class="text-muted">마지막 동기화: <span id="lastSyncTime">-</span></small>
        </div>
      </div>

      <!-- 포스트 목록 리스트 -->
      <div id="postListContainer">
        <div class="text-center py-5">
          <div class="spinner-border text-primary" role="status"></div>
          <p class="mt-2 text-muted">GitHub 저장소에서 포스트 목록을 불러오는 중...</p>
        </div>
      </div>
    </div>
  </div>

  <!-- 3. 포스트 수정 모달 -->
  <div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title fw-bold"><i class="fa-solid fa-pen-to-square text-primary me-2"></i>포스트 수정</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="editSha">
          <input type="hidden" id="editPath">
          <div class="mb-3">
            <label class="form-label fw-semibold">파일명 (Path)</label>
            <input type="text" id="editFileName" class="form-control" readonly>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">마크다운 본문 (Frontmatter 포함)</label>
            <textarea id="editContent" class="form-control editor-textarea"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
          <button type="button" onclick="savePostChanges()" class="btn btn-success fw-semibold"><i class="fa-solid fa-floppy-disk me-1"></i>수정사항 저장</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const REPO_OWNER = 'pognae';
    const REPO_NAME = 'pognae.github.io';
    let allPosts = [];
    let editModalObj = null;

    document.addEventListener('DOMContentLoaded', () => {
      editModalObj = new bootstrap.Modal(document.getElementById('editModal'));
      const savedToken = localStorage.getItem('mp_gh_token');
      if (savedToken) {
        document.getElementById('ghToken').value = savedToken;
        authenticate();
      }
    });

    function authenticate() {
      const token = document.getElementById('ghToken').value.trim();
      if (!token) {
        alert('GitHub Token을 입력해 주세요.');
        return;
      }
      localStorage.setItem('mp_gh_token', token);
      document.getElementById('authSection').classList.add('d-none');
      document.getElementById('mainSection').classList.remove('d-none');
      fetchPosts();
    }

    function logout() {
      localStorage.removeItem('mp_gh_token');
      location.reload();
    }

    async function fetchPosts() {
      const token = localStorage.getItem('mp_gh_token');
      const container = document.getElementById('postListContainer');
      container.innerHTML = `
        <div class="text-center py-5">
          <div class="spinner-border text-primary" role="status"></div>
          <p class="mt-2 text-muted">포스트 목록 불러오는 중...</p>
        </div>`;

      try {
        const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/_posts`, {
          headers: {
            'Authorization': `token ${token}`,
            'Accept': 'application/vnd.github.v3+json'
          }
        });

        if (!response.ok) {
          throw new Error(`GitHub API 호출 실패 (${response.status}) — Token 권한을 확인하세요.`);
        }

        const files = await response.json();
        allPosts = files.filter(f => f.name.endsWith('.md')).reverse();

        document.getElementById('postCountBadge').innerText = `${allPosts.length}개 글`;
        document.getElementById('lastSyncTime').innerText = new Date().toLocaleTimeString();

        renderPostList(allPosts);
      } catch (err) {
        container.innerHTML = `<div class="alert alert-danger" role="alert"><i class="fa-solid fa-triangle-exclamation me-2"></i>${err.message}</div>`;
      }
    }

    function renderPostList(posts) {
      const container = document.getElementById('postListContainer');
      if (posts.length === 0) {
        container.innerHTML = '<div class="text-center py-5 text-muted">검색 조건에 해당하는 포스트가 없습니다.</div>';
        return;
      }

      let html = '';
      posts.forEach(p => {
        const dateMatch = p.name.match(/^(\d{4}-\d{2}-\d{2})/);
        const dateStr = dateMatch ? dateMatch[1] : '날짜 미상';

        html += `
          <div class="post-card d-flex justify-content-between align-items-center">
            <div>
              <div class="post-title">${escapeHtml(p.name)}</div>
              <div class="post-meta">
                <span class="badge badge-date me-2">${dateStr}</span>
                <span class="text-muted"><i class="fa-regular fa-file-code me-1"></i>${p.size} bytes</span>
              </div>
            </div>
            <div class="d-flex gap-2">
              <button onclick="openEditModal('${p.path}', '${p.sha}')" class="btn btn-outline-primary btn-sm fw-semibold">
                <i class="fa-solid fa-pen me-1"></i>수정
              </button>
              <button onclick="deletePost('${p.path}', '${p.sha}', '${escapeHtml(p.name)}')" class="btn btn-outline-danger btn-sm fw-semibold">
                <i class="fa-solid fa-trash me-1"></i>삭제
              </button>
            </div>
          </div>`;
      });
      container.innerHTML = html;
    }

    function filterPosts() {
      const query = document.getElementById('searchInput').value.toLowerCase().trim();
      if (!query) {
        renderPostList(allPosts);
        return;
      }
      const filtered = allPosts.filter(p => p.name.toLowerCase().includes(query));
      renderPostList(filtered);
    }

    async function openEditModal(path, sha) {
      const token = localStorage.getItem('mp_gh_token');
      document.getElementById('editFileName').value = path;
      document.getElementById('editSha').value = sha;
      document.getElementById('editPath').value = path;
      document.getElementById('editContent').value = '불러오는 중...';
      editModalObj.show();

      try {
        const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`, {
          headers: { 'Authorization': `token ${token}` }
        });
        const data = await res.json();
        // UTF-8 디코딩
        const content = decodeURIComponent(escape(atob(data.content)));
        document.getElementById('editContent').value = content;
      } catch (err) {
        alert('파일 내용을 불러오지 못했습니다: ' + err.message);
      }
    }

    async function savePostChanges() {
      const token = localStorage.getItem('mp_gh_token');
      const path = document.getElementById('editPath').value;
      const sha = document.getElementById('editSha').value;
      const content = document.getElementById('editContent').value;

      if (!confirm(`'${path}' 포스트의 수정 내용을 GitHub에 저장하시겠습니까?`)) return;

      // Base64 인코딩 (UTF-8)
      const encodedContent = btoa(unescape(encodeURIComponent(content)));

      try {
        const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`, {
          method: 'PUT',
          headers: {
            'Authorization': `token ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            message: `admin: update post ${path}`,
            content: encodedContent,
            sha: sha
          })
        });

        if (!res.ok) {
          const errData = await res.json();
          throw new Error(errData.message || '저장 실패');
        }

        alert('성공적으로 수정사항이 저장 및 저장소에 반영되었습니다!');
        editModalObj.hide();
        fetchPosts();
      } catch (err) {
        alert('수정 실패: ' + err.message);
      }
    }

    async function deletePost(path, sha, fileName) {
      const token = localStorage.getItem('mp_gh_token');
      if (!confirm(`정말로 포스트 '${fileName}'을(를) 영구 삭제하시겠습니까?`)) return;

      try {
        const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`, {
          method: 'DELETE',
          headers: {
            'Authorization': `token ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            message: `admin: delete post ${path}`,
            sha: sha
          })
        });

        if (!res.ok) {
          const errData = await res.json();
          throw new Error(errData.message || '삭제 실패');
        }

        alert(`포스트 '${fileName}'이(가) 성공적으로 삭제되었습니다.`);
        fetchPosts();
      } catch (err) {
        alert('삭제 실패: ' + err.message);
      }
    }

    function escapeHtml(str) {
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }
  </script>
</body>
</html>
