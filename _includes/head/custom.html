<style>

      /* 부모(author__urls-wrapper) 기준으로 절대 배치되도록 static 강제 */
      visibility: visible !important;
      /* 테마의 기본 숨김 처리 무력화 */

      box-shadow: none !important;
      padding: 0 !important;

    /* 기본적으로 다른 링크 항목들은 숨기고 방문자 수만 노출 */

      display: flex !important;
      position: absolute;
      right: 0;

<script>
  document.addEventListener("DOMContentLoaded", function() {
    function cleanTitleText(text) {
      if (!text) return "";
      return text.replace(/\*\*/g, "").replace(/\*/g, "").replace(/[`#_~]/g, "").trim().replace(/\s+/g, " ");
    }

    // Tab title
    if (document.title.includes("*")) {
      document.title = cleanTitleText(document.title);
    }

    // Page/Post title elements, list items, and paginator text
    const selectors = [
      "h1.page__title",
      ".page__title",
      ".archive__item-title a",
      ".pager-title"
    ];
    selectors.forEach(function(sel) {
      document.querySelectorAll(sel).forEach(function(el) {
        if (el.textContent.includes("*")) {
          if (el.children.length === 0) {
            el.textContent = cleanTitleText(el.textContent);
          } else {
            for (var i = 0; i < el.childNodes.length; i++) {
              var node = el.childNodes[i];
              if (node.nodeType === Node.TEXT_NODE && node.textContent.includes("*")) {
                node.textContent = cleanTitleText(node.textContent);
              }
            }
          }
        }
      });
    });
  });
</script>
