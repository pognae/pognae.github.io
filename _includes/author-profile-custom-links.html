<li class="visitor-counter-li">
  <div class="visitor-counter-div" style="padding: 10px 0; font-size: 0.9em; color: #666;">
    <i class="fas fa-fw fa-eye" aria-hidden="true"></i> 방문자 수: <span id="visitor-count">...</span>
  </div>
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      // 나중에 Cloudflare Worker 도메인으로 변경하세요. (예: https://counter.your-worker.workers.dev)
      const workerUrl = "https://counter.monopoint.workers.dev/"; 
      
      fetch(workerUrl)
        .then(response => response.json())
        .then(data => {
          if(data.visits) {
            document.getElementById('visitor-count').innerText = data.visits.toLocaleString();
          } else {
            document.getElementById('visitor-count').innerText = "조회 불가";
          }
        })
        .catch(err => {
          console.error("Counter fetch error:", err);
          document.getElementById('visitor-count').innerText = "-";
        });
    });
  </script>
</li>
