{% if page.previous or page.next %}
<nav class="pagination--pager" aria-label="포스트 탐색">
  {% if page.previous %}
    <a href="{{ page.previous.url | relative_url }}" class="pagination--pager__btn prev" title="{{ page.previous.title | markdownify | strip_html }}">
      <span class="pager-label">← 이전 글</span>
      <span class="pager-title">{{ page.previous.title | strip_html | truncate: 32 }}</span>
    </a>
  {% else %}
    <div class="pagination--pager__btn prev disabled">
      <span class="pager-label">← 이전 글</span>
      <span class="pager-title">첫 번째 글입니다</span>
    </div>
  {% endif %}

  {% if page.next %}
    <a href="{{ page.next.url | relative_url }}" class="pagination--pager__btn next" title="{{ page.next.title | markdownify | strip_html }}">
      <span class="pager-label">다음 글 →</span>
      <span class="pager-title">{{ page.next.title | strip_html | truncate: 32 }}</span>
    </a>
  {% else %}
    <div class="pagination--pager__btn next disabled">
      <span class="pager-label">다음 글 →</span>
      <span class="pager-title">최신 글입니다</span>
    </div>
  {% endif %}
</nav>
{% endif %}
